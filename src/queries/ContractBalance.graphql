query ContractBalance(
  $token_in: [String!]!
  $account_not_in: [String!]!
  $limit: Int = 1000
  $offset: Int = 0
) {
  
  Token(where: { id: { _in: $token_in } }) {
    id
    address
    name
    decimals
    symbol
    balances(
      order_by: { amount: desc }
      limit: $limit
      offset: $offset
      where: { 
        amount: { _gt: 0 }, 
        account_id: { _nin: $account_not_in } 
      }
    ) {
      account_id
      amount
    }
  }
}
