# pnpm 10.26+ — explicit false suppresses "Ignored build scripts" warnings
allowBuilds:
  "@biomejs/biome": true

ignoredBuiltDependencies: []

minimumReleaseAge: 10080 # 7 days in minutes
minimumReleaseAgeExclude: []

onlyBuiltDependencies:
  - "@biomejs/biome"
  - lefthook

trustPolicy: no-downgrade
trustPolicyExclude:
  - "@graphql-tools/batch-execute@9.0.19"
  - "@graphql-tools/delegate@10.2.23"
  - "@graphql-tools/executor-graphql-ws@2.0.7"
  - "@graphql-tools/executor-http@1.3.3"
  - "@graphql-tools/wrap@10.1.4"
  - "hosted-git-info@6.1.3"
  - "pino@9.14.0"
  - "ua-parser-js@1.0.41"
  - "semver@6.3.1"
